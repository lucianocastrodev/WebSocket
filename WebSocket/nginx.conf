server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cache de arquivos estáticos
    location /_framework/ {
        cache_control "public, max-age=31536000, immutable";
    }

    location /_content/ {
        cache_control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri /index.html;
    }

    # Habilitar gzip
    gzip on;
    gzip_types text/plain application/javascript text/css application/octet-stream;
    gzip_min_length 256;
}